# MobileGuard — Drop-in GitHub Actions workflow
# Copy this to .github/workflows/mobileguard.yml in your mobile project

name: MobileGuard Governance Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  mobileguard-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # for SARIF upload
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MobileGuard
        run: pip install mobileguard

      - name: Run governance scan
        run: |
          mobileguard scan . \
            --platform auto \
            --rules all \
            --severity warning \
            --format sarif \
            --output mobileguard.sarif \
            --fail-on critical

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: mobileguard.sarif
          category: mobileguard

      - name: Generate compliance report on main
        if: github.ref == 'refs/heads/main'
        run: |
          mobileguard audit . \
            --app-name "${{ github.event.repository.name }}" \
            --version "${{ github.sha }}" \
            --format markdown \
            --output mobileguard-audit-report.md

      - name: Upload audit report
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: mobileguard-audit-report
          path: mobileguard-audit-report.md
          retention-days: 90
